<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scientific Data Lab</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="landing">
  <div class="landing-shell">
    <div class="brand">
      <div class="logo-dot"></div>
      <div>
        <div class="brand-title">Scientific Data Lab</div>
        <div class="brand-sub">High-contrast · Interactive · Analysis-first UI</div>
      </div>
    </div>

    <div class="landing-card">
      <h1>資料分析工作台</h1>
      <p>
        支援：<span class="pill">MIC 相關性</span>
        <span class="pill">X–Y / X1–X2–Y</span>
        <span class="pill">2D / 3D Hover & Click</span>
        <span class="pill">Heteroscedastic / Instability</span>
      </p>

      <div class="landing-actions" style="flex-wrap:wrap;">
        <a class="btn primary" href="main.html">進入主介面</a>
        <a class="btn" href="heteroscedastic.html">進入不穩定度工作台</a>
        <button class="btn ghost" id="btnHealth">檢查後端連線</button>
      </div>

      <pre class="mono small" id="healthOut" style="display:none;"></pre>
    </div>

    <div class="footer-note mono small">
      Tip：先啟動 FastAPI（例如 http://10.1.3.127:6030），再進入主介面。
    </div>
  </div>

  <script>
    // 這裡只做最小的 health check，真正功能在 main.html/app.js
    const API_BASE = localStorage.getItem('API_BASE') || 'http://10.1.3.127:6030';
    document.getElementById('btnHealth').addEventListener('click', async () => {
      const out = document.getElementById('healthOut');
      out.style.display = 'block';
      out.textContent = 'Checking... ' + API_BASE;
      try {
        const r = await fetch(API_BASE + '/config');
        const j = await r.json();
        out.textContent = JSON.stringify(j, null, 2);
      } catch (e) {
        out.textContent = 'FAILED: ' + String(e);
      }
    });
  </script>
</body>
</html>
